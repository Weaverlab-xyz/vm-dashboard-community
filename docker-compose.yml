services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dashboardadmin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: vmclidashboard
    # Host port 5433 (not the Postgres default 5432) so this stack can run
    # alongside another local Postgres / dev dashboard on 5432. Inside the
    # compose network the app still talks to db:5432 — only the host
    # binding changes.
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dashboardadmin -d vmclidashboard"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      args:
        # Escape hatch for corp networks where the proxy still mangles
        # trixie-updates / trixie-security Packages files even with the
        # corp CA installed. Set via:
        #   BUILD_SKIP_DEBIAN_UPDATES=1 docker compose build
        # or via scripts/onboard.sh's ONBOARD_SKIP_DEBIAN_UPDATES=1 env.
        BUILD_SKIP_DEBIAN_UPDATES: ${BUILD_SKIP_DEBIAN_UPDATES:-0}
    restart: unless-stopped
    # Host port 8001 to coexist with another dashboard on 8000. Browse at
    # http://localhost:8001 . The container itself still listens on 8000.
    ports:
      - "8001:8000"
    # All settings come from .env at the repo root (populated by
    # scripts/Onboard-Dashboard.ps1 on first run). DATABASE_URL is the one
    # exception — it's assembled here so POSTGRES_PASSWORD interpolation
    # stays in a single place and can't drift between files.
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://dashboardadmin:${POSTGRES_PASSWORD:-devpassword}@db:5432/vmclidashboard
      - JWT_SECRET_KEY_FILE=/run/secrets/jwt_key
    secrets:
      - jwt_key
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Live-reload Python source without rebuilding the image.
      - type: bind
        source: ./web_dashboard
        target: /app/web_dashboard
      # Docker socket — lets the app launch sibling Ansible containers for
      # local config-mgmt runs against on-premises hypervisors.
      # Remove this mount if you do not use the Ansible integration.
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock

  # Dedicated background job runner — executes long Terraform jobs (k8s + cloud-DB
  # provision/decommission) OUT of the gunicorn request workers so they survive
  # worker recycling/crashes/redeploys. Same image as `app`; shares DB + config +
  # state backend. No HTTP port, no docker socket (these jobs are terraform-only).
  worker:
    build:
      context: .
      args:
        BUILD_SKIP_DEBIAN_UPDATES: ${BUILD_SKIP_DEBIAN_UPDATES:-0}
    command: ["python", "-m", "web_dashboard.jobs_worker"]
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://dashboardadmin:${POSTGRES_PASSWORD:-devpassword}@db:5432/vmclidashboard
      - JWT_SECRET_KEY_FILE=/run/secrets/jwt_key
    secrets:
      - jwt_key
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Live-reload source (matches app); restart the worker to pick up changes
      # (it runs `python -m`, not gunicorn --reload).
      - type: bind
        source: ./web_dashboard
        target: /app/web_dashboard

volumes:
  pgdata:

secrets:
  jwt_key:
    file: .jwt_secret_key
