services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dashboardadmin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: vmclidashboard
    # Host port 5433 (not the Postgres default 5432) so this stack can run
    # alongside another local Postgres / dev dashboard on 5432. Inside the
    # compose network the app still talks to db:5432 — only the host
    # binding changes.
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dashboardadmin -d vmclidashboard"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      args:
        # Escape hatch for corp networks where the proxy still mangles
        # trixie-updates / trixie-security Packages files even with the
        # corp CA installed. Set via:
        #   BUILD_SKIP_DEBIAN_UPDATES=1 docker compose build
        # or via scripts/onboard.sh's ONBOARD_SKIP_DEBIAN_UPDATES=1 env.
        BUILD_SKIP_DEBIAN_UPDATES: ${BUILD_SKIP_DEBIAN_UPDATES:-0}
    restart: unless-stopped
    # Host port 8001 to coexist with another dashboard on 8000. Browse at
    # http://localhost:8001 . The container itself still listens on 8000.
    ports:
      - "8001:8000"
    # All settings come from .env at the repo root (populated by
    # scripts/Onboard-Dashboard.ps1 on first run). DATABASE_URL is the one
    # exception — it's assembled here so POSTGRES_PASSWORD interpolation
    # stays in a single place and can't drift between files.
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://dashboardadmin:${POSTGRES_PASSWORD:-devpassword}@db:5432/vmclidashboard
      - JWT_SECRET_KEY_FILE=/run/secrets/jwt_key
      # Shared work dir for the transient kubectl/helm runner containers. The
      # runner is a sibling (launched over the host docker.sock), so it must read
      # the kubeconfig from a NAMED VOLUME shared by name — a bind of an
      # in-container tmpdir resolves empty on the host and helm then hits
      # localhost:8080. See k8s_service._runner_workdir.
      - RUNNER_WORK_DIR=/runner-work
      - RUNNER_WORK_VOLUME=vmdash_runner_work
    secrets:
      - jwt_key
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Live-reload Python source without rebuilding the image.
      - type: bind
        source: ./web_dashboard
        target: /app/web_dashboard
      # Docker socket — lets the app launch sibling Ansible containers for
      # local config-mgmt runs against on-premises hypervisors.
      # Remove this mount if you do not use the Ansible integration.
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
      # Shared named volume so the sibling kubectl/helm runner containers can read
      # the kubeconfig this service writes (see k8s_service._runner_workdir).
      - runner_work:/runner-work

  # Dedicated background job runner — runs long jobs (k8s + cloud-DB provision/
  # decommission, and the k8s management-plane / ESO installs) OUT of the gunicorn
  # request workers so they survive worker recycling/crashes/redeploys. Same image
  # as `app`; shares DB + config + state backend. No HTTP port.
  #
  # Each worker runs ONE job at a time (serially), so the replica count IS the
  # number of long jobs that can run concurrently — raise WORKER_REPLICAS (in .env)
  # when quick jobs queue behind long ones. The `jobs` table claim is atomic, so
  # replicas never double-execute a job.
  worker:
    build:
      context: .
      args:
        BUILD_SKIP_DEBIAN_UPDATES: ${BUILD_SKIP_DEBIAN_UPDATES:-0}
    command: ["python", "-m", "web_dashboard.jobs_worker"]
    restart: unless-stopped
    deploy:
      # Concurrent workers = concurrent long jobs. `docker compose up` honors this;
      # override ad-hoc with: docker compose up -d --scale worker=N. Defaults to 3
      # (drop WORKER_REPLICAS toward 1 on small hosts, raise it if jobs still queue).
      replicas: ${WORKER_REPLICAS:-3}
      # Per-worker caps bound aggregate host usage when several heavy jobs run at
      # once (jobs are mostly orchestration + cloud-API waits). Tune to your host.
      resources:
        limits:
          cpus: "${WORKER_CPU_LIMIT:-2}"
          memory: ${WORKER_MEM_LIMIT:-2g}
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://dashboardadmin:${POSTGRES_PASSWORD:-devpassword}@db:5432/vmclidashboard
      - JWT_SECRET_KEY_FILE=/run/secrets/jwt_key
      # Shared work dir for the transient kubectl/helm runner containers. The
      # runner is a sibling (launched over the host docker.sock), so it must read
      # the kubeconfig from a NAMED VOLUME shared by name — a bind of an
      # in-container tmpdir resolves empty on the host and helm then hits
      # localhost:8080. See k8s_service._runner_workdir.
      - RUNNER_WORK_DIR=/runner-work
      - RUNNER_WORK_VOLUME=vmdash_runner_work
    secrets:
      - jwt_key
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Live-reload source (matches app); restart the worker to pick up changes
      # (it runs `python -m`, not gunicorn --reload).
      - type: bind
        source: ./web_dashboard
        target: /app/web_dashboard
      # The k8s management-plane / ESO jobs launch transient kubectl/helm runner
      # containers via the host docker daemon (same as the app).
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
      # Shared named volume so the sibling kubectl/helm runner containers can read
      # the kubeconfig this service writes (see k8s_service._runner_workdir).
      - runner_work:/runner-work

volumes:
  pgdata:
  # Shared between app/worker and the transient kubectl/helm runner containers
  # they launch as siblings. Explicit name (no compose project prefix) so the
  # runner can mount it by the name in RUNNER_WORK_VOLUME.
  runner_work:
    name: vmdash_runner_work

secrets:
  jwt_key:
    file: .jwt_secret_key
