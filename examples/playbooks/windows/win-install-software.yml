# Install software via Chocolatey
# Target: Windows cloud VMs (Azure today) over WinRM.
# Bootstraps Chocolatey (win_chocolatey installs it on first use) and installs a
# small set of packages. Idempotent.
#
# HOW TO RUN — local runner, or the Azure (ACI) cloud runner; supply the admin
# password via Use a secret (recommended) or as an extra_var:
#   ansible_user: azureuser
#   ansible_password: <bind via Use a secret, or the Windows admin password>
#
# extra_vars (optional): choco_packages: ["git", "7zip", "googlechrome"]
- name: Install software with Chocolatey
  hosts: all
  gather_facts: false
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: ntlm
    ansible_port: 5986
    ansible_winrm_server_cert_validation: ignore
    choco_packages:
      - git
      - 7zip
  tasks:
    - name: Install packages
      community.windows.win_chocolatey:
        name: "{{ choco_packages }}"
        state: present
