# Install Prometheus node_exporter as a systemd service
# Target: Linux cloud VMs (any cloud). Exposes metrics on :9100.
# Idempotent: downloads a pinned version, installs a dedicated user + unit.
#
# Make sure your security group / NSG / firewall allows the scraper to reach :9100.
#
# extra_vars (optional): node_exporter_version: "1.8.2"
- name: Install Prometheus node_exporter
  hosts: all
  become: true
  vars:
    node_exporter_version: "1.8.2"
    node_exporter_arch: "{{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }}"
  handlers:
    - name: Restart node_exporter
      ansible.builtin.systemd:
        name: node_exporter
        state: restarted
        daemon_reload: true

  tasks:
    - name: Create node_exporter system user
      ansible.builtin.user:
        name: node_exporter
        system: true
        shell: /usr/sbin/nologin
        create_home: false

    - name: Download and extract node_exporter
      ansible.builtin.unarchive:
        src: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-{{ node_exporter_arch }}.tar.gz"
        dest: /tmp
        remote_src: true

    - name: Install the binary
      ansible.builtin.copy:
        src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-{{ node_exporter_arch }}/node_exporter"
        dest: /usr/local/bin/node_exporter
        mode: "0755"
        remote_src: true
        owner: root
        group: root
      notify: Restart node_exporter

    - name: Install the systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/node_exporter.service
        mode: "0644"
        content: |
          [Unit]
          Description=Prometheus Node Exporter
          After=network-online.target
          Wants=network-online.target

          [Service]
          User=node_exporter
          ExecStart=/usr/local/bin/node_exporter
          Restart=on-failure

          [Install]
          WantedBy=multi-user.target
      notify: Restart node_exporter

    - name: Enable and start node_exporter
      ansible.builtin.systemd:
        name: node_exporter
        state: started
        enabled: true
        daemon_reload: true
