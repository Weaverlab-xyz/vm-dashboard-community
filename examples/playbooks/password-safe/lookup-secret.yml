# Retrieve a SECRET (text / credential / file) from BeyondTrust Secrets Safe in-play
# via the beyondtrust.secrets_safe collection, and write it to a 0600 file.
#
# Target: On-prem host / localhost (Config Management runs this hosts: localhost play).
# Credentials are auto-injected (PASSWORD_SAFE_* env) when BeyondTrust is enabled — see
# lookup-managed-account.yml for the details. The lookup runs on the runner.
#
# SECRET paths are "folder/secret_title" (MANAGED_ACCOUNT paths are "system/account").
#
# extra_vars:
#   secret_path: "FOLDER/SECRET_TITLE"    # required
#   dest_file:   "/tmp/retrieved.secret"  # where to write it (0600)
- name: Retrieve a secret from Password Safe and store it securely
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    ps_api_url: "{{ lookup('ansible.builtin.env', 'PASSWORD_SAFE_API_URL') }}"
    ps_client_id: "{{ lookup('ansible.builtin.env', 'PASSWORD_SAFE_CLIENT_ID') }}"
    ps_client_secret: "{{ lookup('ansible.builtin.env', 'PASSWORD_SAFE_CLIENT_SECRET') }}"
    ps_verify_ca: true
    secret_path: "FOLDER/SECRET_TITLE"
    dest_file: "/tmp/retrieved.secret"
  tasks:
    - name: Validate inputs
      ansible.builtin.assert:
        that:
          - ps_api_url | length > 0
          - ps_client_id | length > 0
          - ps_client_secret | length > 0
          - secret_path | length > 0
          - "'/' in secret_path"
          - dest_file | length > 0
        fail_msg: >-
          Password Safe creds (PASSWORD_SAFE_* env) and a secret_path (folder/secret_title)
          plus dest_file are required.

    - name: Retrieve the secret
      ansible.builtin.set_fact:
        ps_secret_value: "{{ lookup('beyondtrust.secrets_safe.secrets_safe_lookup',
          api_url=ps_api_url,
          api_version='3.1',
          retrieval_type='SECRET',
          client_id=ps_client_id,
          client_secret=ps_client_secret,
          secret_list=secret_path,
          decrypt=True,
          verify_ca=ps_verify_ca,
          wantlist=False) }}"
      no_log: true

    - name: Confirm the secret came back
      ansible.builtin.assert:
        that: ps_secret_value | length > 0
        fail_msg: >-
          No secret returned for {{ secret_path }} — check the path and that the API user
          has Secrets→Read on it.
        success_msg: "Retrieved {{ secret_path }}."

    - name: Write the secret to a 0600 file
      ansible.builtin.copy:
        dest: "{{ dest_file }}"
        content: "{{ ps_secret_value }}"
        mode: "0600"
      no_log: true              # the content is a secret
