# Create a PostgreSQL login role whose password comes from Password Safe.
#
# Target kind: Cloud database (Config Management → target kind "Cloud database"). Runs on
# the ansible-cloud runner image (which now ships the beyondtrust.secrets_safe collection
# alongside community.postgresql). The dashboard auto-injects BOTH:
#   * the DB admin connection — db_login_host / _port / _user / _password (+ db_name)
#   * the Password Safe creds — PASSWORD_SAFE_* env (when BeyondTrust is enabled)
# so the play fetches the NEW role's password from Password Safe and never sees a
# plaintext password anywhere.
#
# This is a localhost play — Ansible connects OUT to the private DB endpoint; the lookup
# reaches OUT to Password Safe, both from the in-cloud runner.
#
# extra_vars:
#   target_role:      "appuser"                 # the role to create (required)
#   role_secret_path: "FOLDER/appuser-password" # PS SECRET holding its password (folder/title)
- name: Create a PostgreSQL role using a password from Password Safe
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    ps_api_url: "{{ lookup('ansible.builtin.env', 'PASSWORD_SAFE_API_URL') }}"
    ps_client_id: "{{ lookup('ansible.builtin.env', 'PASSWORD_SAFE_CLIENT_ID') }}"
    ps_client_secret: "{{ lookup('ansible.builtin.env', 'PASSWORD_SAFE_CLIENT_SECRET') }}"
    ps_verify_ca: true
    target_role: ""
    role_secret_path: ""
  tasks:
    - name: Validate inputs
      ansible.builtin.assert:
        that:
          - ps_api_url | length > 0
          - ps_client_id | length > 0
          - ps_client_secret | length > 0
          - target_role | length > 0
          - role_secret_path | length > 0
          - "'/' in role_secret_path"
          - db_login_host is defined and db_login_host | length > 0
        fail_msg: >-
          Need Password Safe creds (PASSWORD_SAFE_* env), target_role, role_secret_path
          (folder/secret_title), and a Cloud-database target (db_login_* auto-injected).

    - name: Fetch the role password from Password Safe
      ansible.builtin.set_fact:
        target_role_password: "{{ lookup('beyondtrust.secrets_safe.secrets_safe_lookup',
          api_url=ps_api_url,
          api_version='3.1',
          retrieval_type='SECRET',
          client_id=ps_client_id,
          client_secret=ps_client_secret,
          secret_list=role_secret_path,
          decrypt=True,
          verify_ca=ps_verify_ca,
          wantlist=False) }}"
      no_log: true

    - name: Confirm the password came back
      ansible.builtin.assert:
        that: target_role_password | length > 0
        fail_msg: "No secret at {{ role_secret_path }} — check the path and the API user's Secrets→Read scope."

    - name: Ensure the role exists with the Password Safe-sourced password
      community.postgresql.postgresql_user:
        name: "{{ target_role }}"
        password: "{{ target_role_password }}"
        state: present
        login_host: "{{ db_login_host }}"
        login_port: "{{ db_login_port }}"
        login_user: "{{ db_login_user }}"
        login_password: "{{ db_login_password }}"
        # Postgres has no per-role login DB; the module connects to the maintenance DB.
        login_db: "{{ db_name | default(omit, true) }}"
      no_log: true              # the role password is a secret
