# Fetch a secret from Password Safe on the runner, then deliver it to a Linux VM.
#
# Target: Linux cloud VMs (any cloud) — `hosts: all`, SSH. Demonstrates that the
# beyondtrust.secrets_safe lookup runs on the Ansible CONTROLLER (the runner container,
# which the dashboard has already given the PASSWORD_SAFE_* creds), NOT on the target
# host — so the VM never needs Password Safe reachability or credentials. Runs on the
# default VM runner image (chrweav/ansible-winrm), which now ships the collection.
#
# Credentials are auto-injected (PASSWORD_SAFE_* env) when BeyondTrust is enabled.
#
# extra_vars:
#   secret_path: "FOLDER/APP_TOKEN"   # the PS secret to deliver (folder/title)
#   dest_file:   "/etc/myapp/token"   # path on the TARGET host (written 0600)
- name: Deliver a Password Safe secret to the target host
  hosts: all
  become: true
  gather_facts: false
  vars:
    ps_api_url: "{{ lookup('ansible.builtin.env', 'PASSWORD_SAFE_API_URL') }}"
    ps_client_id: "{{ lookup('ansible.builtin.env', 'PASSWORD_SAFE_CLIENT_ID') }}"
    ps_client_secret: "{{ lookup('ansible.builtin.env', 'PASSWORD_SAFE_CLIENT_SECRET') }}"
    ps_verify_ca: true
    secret_path: "FOLDER/APP_TOKEN"
    dest_file: "/etc/myapp/token"
  tasks:
    - name: Validate inputs
      ansible.builtin.assert:
        that:
          - ps_api_url | length > 0
          - ps_client_id | length > 0
          - ps_client_secret | length > 0
          - secret_path | length > 0
          - "'/' in secret_path"
        fail_msg: >-
          Password Safe creds (PASSWORD_SAFE_* env) and a secret_path (folder/secret_title)
          are required.

    # Ansible evaluates lookups on the controller during templating, so this reaches
    # Password Safe FROM THE RUNNER even though the play targets a remote host.
    - name: Fetch the secret from Password Safe (on the runner)
      ansible.builtin.set_fact:
        app_secret: "{{ lookup('beyondtrust.secrets_safe.secrets_safe_lookup',
          api_url=ps_api_url,
          api_version='3.1',
          retrieval_type='SECRET',
          client_id=ps_client_id,
          client_secret=ps_client_secret,
          secret_list=secret_path,
          decrypt=True,
          verify_ca=ps_verify_ca,
          wantlist=False) }}"
      no_log: true

    - name: Confirm the secret came back
      ansible.builtin.assert:
        that: app_secret | length > 0
        fail_msg: "No secret returned for {{ secret_path }} — check the path and the API user's Secrets→Read scope."

    - name: Ensure the destination directory exists on the target
      ansible.builtin.file:
        path: "{{ dest_file | dirname }}"
        state: directory
        mode: "0750"

    - name: Install the secret on the target host
      ansible.builtin.copy:
        dest: "{{ dest_file }}"
        content: "{{ app_secret }}"
        mode: "0600"
      no_log: true              # the content is a secret
