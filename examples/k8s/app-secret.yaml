# Secret-as-env demo: a Secret and a workload that consumes it.
#
# NOTE ON SECRETS: this ships a placeholder `stringData` value so the sample
# applies as-is, but a literal secret in a manifest is exactly what you DON'T
# want in real use — it lands in version control and etcd in clear text. For
# managed clusters, prefer the dashboard's in-cluster secret delivery (External
# Secrets Operator → Password Safe; see docs/integrations/portainer.md and the
# k8s secret-delivery flow), which syncs the value from your secrets backend and
# never commits it. Swap the `Secret` below for an `ExternalSecret` then.
---
apiVersion: v1
kind: Secret
metadata:
  name: app-credentials
  namespace: sample-apps
type: Opaque
stringData:
  DB_PASSWORD: change-me   # placeholder — supply via ESO/Password Safe in real use
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secret-consumer
  namespace: sample-apps
  labels:
    app: secret-consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secret-consumer
  template:
    metadata:
      labels:
        app: secret-consumer
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - 'echo "DB_PASSWORD present: ${DB_PASSWORD:+yes}"; sleep 3600'
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-credentials
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
