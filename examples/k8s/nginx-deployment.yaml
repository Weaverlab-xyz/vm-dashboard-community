# Stateless web Deployment + ClusterIP Service — the canonical "it runs" sample.
# Uses the *unprivileged* nginx image (listens on 8080, runs as uid 101) so it
# satisfies the namespace's `restricted` Pod Security level out of the box.
# Reach it in-cluster at http://web.sample-apps.svc.cluster.local; see
# nginx-ingress.yaml to expose it externally and nginx-hpa.yaml to autoscale it.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: sample-apps
  labels:
    app: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /
              port: http
          livenessProbe:
            httpGet:
              path: /
              port: http
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: sample-apps
  labels:
    app: web
spec:
  type: ClusterIP
  selector:
    app: web
  ports:
    - name: http
      port: 80
      targetPort: http
