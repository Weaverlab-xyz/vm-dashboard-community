# Ingress exposing the `web` Service (nginx-deployment.yaml) at a hostname.
# PREREQUISITE: an ingress controller must be installed in the cluster (e.g.
# ingress-nginx). Managed EKS/AKS/GKE clusters do NOT ship one by default — on a
# cloud provider an Ingress typically provisions an external L7 load balancer.
#
# Edit `host` to a name that resolves to your ingress controller, and set
# `ingressClassName` to your controller's class (`nginx` for ingress-nginx).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web
  namespace: sample-apps
  labels:
    app: web
spec:
  ingressClassName: nginx
  rules:
    - host: web.example.com   # change-me — point this at your ingress controller
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
