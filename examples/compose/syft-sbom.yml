# Syft (Anchore) — one-shot SBOM generation for a container image
# App-catalog entry: "Image supply-chain / scanning" (Notion stream: saas-self-supplychain)
# Shape: ONE-SHOT job (restart: "no") — generates an SBOM and exits.
#
# Deploy to: ECS / ACI / GCE. The SBOM is printed to the container logs.
# Runs out of the box against nginx:latest (no volumes — Syft reads a remote image).
#
# ADAPT BEFORE USE: replace nginx:latest with your image; change "-o table" to
# "-o spdx-json" or "-o cyclonedx-json" to emit a machine-readable SBOM.
#
# ACI note: on Azure ACI `command` replaces the image entrypoint — deploy this to
# ECS/GCE, or prefix the binary: ["syft", "nginx:latest", ...]. See README.md.
services:
  syft:
    image: anchore/syft:v1.14.0
    command: ["nginx:latest", "-o", "table"]
    restart: "no"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
