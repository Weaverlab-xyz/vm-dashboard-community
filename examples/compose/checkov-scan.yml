# Checkov — one-shot IaC static analysis (Terraform / CloudFormation / k8s / …)
# App-catalog entry: "IaC & config-drift" (Notion stream: saas-iac-hardening, compliance-as-code)
# Shape: ONE-SHOT job (restart: "no"). Best on ECS or GCE (see ACI note below).
# tfsec and Terrascan are drop-in alternatives — swap the image + command.
#
# As shipped it runs `checkov --version` to confirm the container deploys and runs.
# Checkov scans a directory of IaC; the cloud compose subset has no volume mounts,
# so supplying that directory is the "little more work" step.
#
# ADAPT BEFORE USE — supply IaC to scan, e.g.:
#   - build a small derived image FROM bridgecrew/checkov that COPYs your IaC in,
#     then:  command: ["-d", "/iac", "--compact"]
#   - alternatives:  aquasec/tfsec ["/iac"]   |   tenable/terrascan ["scan", "-d", "/iac"]
#
# `entrypoint` is set so this deploys identically on ECS, ACI, and GCE. If ACI
# reports "executable file not found", adjust entrypoint to the image's binary path.
services:
  checkov:
    image: bridgecrew/checkov:3.2.0
    entrypoint: ["checkov"]
    command: ["--version"]
    restart: "no"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
