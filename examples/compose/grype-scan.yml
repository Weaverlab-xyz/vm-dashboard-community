# Grype (Anchore) — one-shot vulnerability scan of a container image
# App-catalog entry: "Image supply-chain / scanning" (Notion stream: saas-image-supplychain)
# Shape: ONE-SHOT job (restart: "no") — scans a remote image and exits.
#
# Deploy to: ECS / ACI / GCE. Findings print to the container logs.
# Runs out of the box against nginx:latest (no volumes needed).
#
# ADAPT BEFORE USE: replace nginx:latest with your image. Add "--fail-on high" to
# make the job exit non-zero when High+ vulnerabilities are found.
#
# `entrypoint` is set so this deploys identically on ECS, ACI, and GCE. If ACI
# reports "executable file not found", adjust entrypoint to the image's binary path.
services:
  grype:
    image: anchore/grype:v0.82.0
    entrypoint: ["/grype"]
    command: ["nginx:latest"]
    restart: "no"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
