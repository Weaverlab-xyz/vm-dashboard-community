{% extends "base.html" %}

{% block title %}Configuration – Infrastructure Management{% endblock %}

{% block content %}
<div x-data="configMgmt()" x-init="init()" class="space-y-6">

  <!-- Header -->
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-gray-800">Configuration</h1>
      <p class="text-sm text-gray-500 mt-1">Run Ansible playbooks and provisioning assets against hypervisors and cloud VMs.</p>
    </div>
    <a href="/jobs" class="text-sm text-blue-600 hover:underline">View all jobs →</a>
  </div>

  <!-- No targets configured -->
  <template x-if="!loading && targets.length === 0 && !hasCloudTargets">
    <div class="bg-amber-50 border border-amber-200 rounded-xl p-6 text-center">
      <svg class="h-10 w-10 text-amber-400 mx-auto mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 9v2m0 4h.01M12 3a9 9 0 100 18A9 9 0 0012 3z"/>
      </svg>
      <p class="text-sm font-semibold text-amber-800 mb-1">No targets available</p>
      <p class="text-sm text-amber-700">
        Enable at least one on-premises integration in
        <a href="/settings" class="underline font-medium">Settings → Integrations</a>,
        or deploy cloud VMs via the AWS / Azure / GCP tabs so they appear here.
      </p>
    </div>
  </template>

  <!-- Loading skeleton -->
  <template x-if="loading">
    <div class="text-sm text-gray-400 text-center py-12">Loading…</div>
  </template>

  <!-- Run panel -->
  <template x-if="!loading && (targets.length > 0 || hasCloudTargets)">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

      <!-- Left: run form -->
      <div class="lg:col-span-1 space-y-4">

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5 space-y-4">
          <h2 class="text-sm font-semibold text-gray-700 uppercase tracking-wide">Run an Asset</h2>

          <!-- Asset picker -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Asset</label>
            <template x-if="assetsLoading">
              <p class="text-sm text-gray-400">Loading assets…</p>
            </template>
            <template x-if="!assetsLoading && assets.length === 0">
              <p class="text-sm text-amber-600">
                No assets found. Upload <code class="bg-amber-50 px-1 rounded">.yml</code>,
                <code class="bg-amber-50 px-1 rounded">.sh</code>,
                <code class="bg-amber-50 px-1 rounded">.deb</code>, or
                <code class="bg-amber-50 px-1 rounded">.rpm</code> files to your storage backend in
                <a href="/settings" class="underline">Settings → Integrations → Ansible</a>.
              </p>
            </template>
            <template x-if="!assetsLoading && assets.length > 0">
              <div class="space-y-1">
                <select x-model="form.asset_key"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm
                               focus:outline-none focus:ring-2 focus:ring-blue-500">
                  <option value="">Select an asset…</option>
                  <template x-for="a in assets" :key="a.backend + '|' + a.name">
                    <option :value="a.backend + '|' + a.name"
                            x-text="a.name + ' (' + backendLabel(a.backend) + ')'"></option>
                  </template>
                </select>
                <!-- Type + backend badge for selected asset -->
                <template x-if="selectedAsset">
                  <div class="flex items-center gap-1.5">
                    <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium"
                          :class="{
                            'bg-blue-100 text-blue-800':   selectedAsset.type === 'playbook',
                            'bg-purple-100 text-purple-800': selectedAsset.type === 'script',
                            'bg-orange-100 text-orange-800': selectedAsset.type === 'rpm',
                            'bg-green-100 text-green-800':  selectedAsset.type === 'deb',
                          }">
                      <span x-text="assetTypeLabel(selectedAsset.type)"></span>
                    </span>
                    <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium"
                          :class="selectedAsset.backend === 'local' ? 'bg-amber-100 text-amber-800' : 'bg-blue-100 text-blue-800'"
                          x-text="backendLabel(selectedAsset.backend)"></span>
                  </div>
                </template>
                <!-- Warning: local asset + cloud target won't work because
                     cloud-side ansible runner can't reach the dashboard's
                     local filesystem (issue #16). -->
                <template x-if="selectedAsset && selectedAsset.backend === 'local' && targetCloud">
                  <div class="mt-2 bg-amber-50 border border-amber-200 rounded-lg px-3 py-2 text-xs text-amber-800">
                    <strong>Local storage can't be used for cloud runs.</strong>
                    This asset lives on the dashboard's local filesystem, which
                    the cloud-side Ansible runner cannot reach. Open the
                    <a href="/storage" class="underline">Storage</a> page and
                    use <em>Move</em> to copy it to a cloud backend
                    (S3 / Azure Blob / GCS) before running.
                  </div>
                </template>
              </div>
            </template>
          </div>

          <!-- Target picker — on-prem groups + cloud VMs -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Target</label>
            <select x-model="form.target" @change="onTargetChange()"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm
                           focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="">Select a target…</option>

              <!-- On-premises hypervisors -->
              <template x-if="targets.length > 0">
                <optgroup label="On-Premises">
                  <template x-for="t in targets" :key="t.key">
                    <option :value="t.key" x-text="`${t.label} (${t.host})`"></option>
                  </template>
                </optgroup>
              </template>

              <!-- EC2 Instances -->
              <template x-if="cloudTargets.aws.length > 0">
                <optgroup label="EC2 Instances (AWS)">
                  <template x-for="t in cloudTargets.aws" :key="`aws:${t.ip}`">
                    <option :value="`aws:${t.ip}`" x-text="`${t.name} (${t.ip})`"></option>
                  </template>
                </optgroup>
              </template>

              <!-- Azure VMs -->
              <template x-if="cloudTargets.azure.length > 0">
                <optgroup label="Azure Virtual Machines">
                  <template x-for="t in cloudTargets.azure" :key="`azure:${t.ip}`">
                    <option :value="`azure:${t.ip}`" x-text="`${t.name} (${t.ip})`"></option>
                  </template>
                </optgroup>
              </template>

              <!-- GCE Instances -->
              <template x-if="cloudTargets.gcp.length > 0">
                <optgroup label="GCE Instances (GCP)">
                  <template x-for="t in cloudTargets.gcp" :key="`gcp:${t.ip}`">
                    <option :value="`gcp:${t.ip}`" x-text="`${t.name} (${t.ip})`"></option>
                  </template>
                </optgroup>
              </template>
            </select>
            <p class="text-xs text-gray-400 mt-1">
              Cloud VMs are read from the instance lists on the AWS / Azure / GCP tabs.
            </p>
          </div>

          <!-- SSH user — only shown for cloud targets, since on-prem hypervisor
               groups carry their own auth. Pre-filled from the per-cloud
               default in Settings → Ansible; override per job as needed. -->
          <div x-show="targetCloud" x-cloak>
            <label class="block text-sm font-medium text-gray-700 mb-1">
              SSH User
              <span class="text-gray-400 font-normal">(suggestion — edit if your image expects a different user)</span>
            </label>
            <input type="text" x-model="form.ansible_user"
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm font-mono
                          focus:outline-none focus:ring-2 focus:ring-blue-500"
                   :placeholder="targetCloud ? (sshUserSuggestions[targetCloud] || 'ec2-user') : 'ec2-user'">
          </div>

          <!-- Extra vars (optional) -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
              Extra Vars
              <span class="text-gray-400 font-normal">(optional JSON, playbooks only)</span>
            </label>
            <textarea x-model="form.extra_vars_raw" rows="3"
                      class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm font-mono
                             focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"
                      placeholder='{"env": "prod", "version": "1.2.3"}'></textarea>
            <p x-show="extraVarsError" x-cloak class="text-xs text-red-600 mt-1" x-text="extraVarsError"></p>
          </div>

          <!-- Error / status -->
          <p x-show="runError" x-cloak class="text-xs text-red-600" x-text="runError"></p>

          <!-- Run button -->
          <button @click="runAsset()"
                  :disabled="running || !form.asset_key || !form.target"
                  class="w-full flex items-center justify-center gap-2 bg-blue-700 hover:bg-blue-800
                         disabled:opacity-50 text-white text-sm font-medium px-4 py-2.5 rounded-lg transition">
            <svg x-show="running" class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
            </svg>
            <span x-text="running ? 'Queuing…' : 'Run'"></span>
          </button>
        </div>

        <!-- Target summary legend -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
          <h2 class="text-sm font-semibold text-gray-700 uppercase tracking-wide mb-3">Available Targets</h2>

          <template x-if="targets.length > 0">
            <div class="mb-3">
              <p class="text-xs text-gray-500 uppercase tracking-wide mb-1">On-Premises</p>
              <ul class="space-y-1.5">
                <template x-for="t in targets" :key="t.key">
                  <li class="flex items-center gap-2 text-sm">
                    <span class="w-2 h-2 rounded-full bg-green-400 flex-shrink-0"></span>
                    <span class="font-medium text-gray-700" x-text="t.label"></span>
                    <span class="text-gray-400 font-mono text-xs truncate" x-text="t.host"></span>
                  </li>
                </template>
              </ul>
            </div>
          </template>

          <template x-if="cloudTargets.aws.length > 0">
            <div class="mb-3">
              <p class="text-xs text-gray-500 uppercase tracking-wide mb-1">EC2 (AWS)</p>
              <ul class="space-y-1.5">
                <template x-for="t in cloudTargets.aws" :key="t.ip">
                  <li class="flex items-center gap-2 text-sm">
                    <span class="w-2 h-2 rounded-full bg-orange-400 flex-shrink-0"></span>
                    <span class="font-medium text-gray-700 truncate" x-text="t.name"></span>
                    <span class="text-gray-400 font-mono text-xs" x-text="t.ip"></span>
                  </li>
                </template>
              </ul>
            </div>
          </template>

          <template x-if="cloudTargets.azure.length > 0">
            <div class="mb-3">
              <p class="text-xs text-gray-500 uppercase tracking-wide mb-1">Azure VMs</p>
              <ul class="space-y-1.5">
                <template x-for="t in cloudTargets.azure" :key="t.ip">
                  <li class="flex items-center gap-2 text-sm">
                    <span class="w-2 h-2 rounded-full bg-blue-400 flex-shrink-0"></span>
                    <span class="font-medium text-gray-700 truncate" x-text="t.name"></span>
                    <span class="text-gray-400 font-mono text-xs" x-text="t.ip"></span>
                  </li>
                </template>
              </ul>
            </div>
          </template>

          <template x-if="cloudTargets.gcp.length > 0">
            <div class="mb-3">
              <p class="text-xs text-gray-500 uppercase tracking-wide mb-1">GCE (GCP)</p>
              <ul class="space-y-1.5">
                <template x-for="t in cloudTargets.gcp" :key="t.ip">
                  <li class="flex items-center gap-2 text-sm">
                    <span class="w-2 h-2 rounded-full bg-red-400 flex-shrink-0"></span>
                    <span class="font-medium text-gray-700 truncate" x-text="t.name"></span>
                    <span class="text-gray-400 font-mono text-xs" x-text="t.ip"></span>
                  </li>
                </template>
              </ul>
            </div>
          </template>

          <p class="text-xs text-gray-400 mt-2">
            Add on-prem targets in <a href="/settings" class="underline">Settings → Integrations</a>.
            Cloud VMs appear automatically once deployed.
          </p>
        </div>
      </div>

      <!-- Right: recent ansible jobs -->
      <div class="lg:col-span-2">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-sm font-semibold text-gray-700 uppercase tracking-wide">Recent Runs</h2>
            <button @click="loadJobs()" class="text-xs text-blue-600 hover:underline">Refresh</button>
          </div>

          <div x-show="jobsLoading" class="text-sm text-gray-400 text-center py-8">Loading…</div>

          <div x-show="!jobsLoading && recentJobs.length === 0" class="text-sm text-gray-400 text-center py-8">
            No runs yet. Select an asset and target above to get started.
          </div>

          <div x-show="!jobsLoading && recentJobs.length > 0" class="overflow-hidden">
            <table class="w-full text-sm">
              <thead>
                <tr class="border-b border-gray-200 text-left text-xs text-gray-500 uppercase tracking-wide">
                  <th class="pb-2 pr-4">Asset / Target</th>
                  <th class="pb-2 pr-4">Status</th>
                  <th class="pb-2 pr-4">Started</th>
                  <th class="pb-2"></th>
                </tr>
              </thead>
              <tbody class="divide-y divide-gray-100">
                <template x-for="job in recentJobs" :key="job.id">
                  <tr>
                    <td class="py-2.5 pr-4">
                      <p class="font-medium text-gray-800 truncate max-w-xs" x-text="job.description"></p>
                    </td>
                    <td class="py-2.5 pr-4">
                      <span class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-xs font-medium"
                            :class="{
                              'bg-green-100 text-green-800': job.status === 'completed',
                              'bg-red-100 text-red-800': job.status === 'failed',
                              'bg-blue-100 text-blue-800': job.status === 'running',
                              'bg-gray-100 text-gray-700': job.status === 'queued',
                            }">
                        <span x-text="job.status"></span>
                      </span>
                    </td>
                    <td class="py-2.5 pr-4 text-gray-500 text-xs" x-text="formatAge(job.created_at)"></td>
                    <td class="py-2.5">
                      <a :href="'/jobs/' + job.id"
                         class="text-xs text-blue-600 hover:underline whitespace-nowrap">View →</a>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </template>

</div>
{% endblock %}

{% block scripts %}
<script>
function configMgmt() {
  return {
    loading: true,
    targets: [],
    assets: [],
    assetsLoading: true,
    cloudTargets: { aws: [], azure: [], gcp: [] },
    jobsLoading: true,
    recentJobs: [],
    running: false,
    runError: '',
    extraVarsError: '',
    form: {
      // asset_key is the composite "<backend>|<name>" string the dropdown
      // binds to. The submit handler splits it into asset + asset_backend
      // for the API. Stored as a composite so the same filename can appear
      // on multiple backends (issue #16).
      asset_key: '',
      target: '',
      ansible_user: '',
      extra_vars_raw: '',
    },
    // Per-cloud SSH user suggestions (populated by loadCloudTargets) — used to
    // pre-fill form.ansible_user when the user picks a cloud target. The user
    // can override per job; the value the form actually submits is whatever's
    // in form.ansible_user at submit time.
    sshUserSuggestions: {},
    get hasCloudTargets() {
      return this.cloudTargets.aws.length > 0
          || this.cloudTargets.azure.length > 0
          || this.cloudTargets.gcp.length > 0;
    },

    // Detect cloud prefix on the selected target so the SSH-user field can
    // show/hide and the per-cloud suggestion can pre-fill.
    get targetCloud() {
      const t = this.form.target;
      if (t.startsWith('aws:'))   return 'aws';
      if (t.startsWith('azure:')) return 'azure';
      if (t.startsWith('gcp:'))   return 'gcp';
      return '';
    },

    // When the user picks a different cloud target, pre-fill ansible_user
    // with the matching per-cloud suggestion (only if the field is empty or
    // still holds the previous cloud's suggestion — never overwrite a value
    // the user has explicitly typed).
    onTargetChange() {
      const cloud = this.targetCloud;
      if (!cloud) return;
      const suggestion = this.sshUserSuggestions[cloud] || '';
      const currentVal = this.form.ansible_user || '';
      const otherSuggestions = Object.values(this.sshUserSuggestions).filter(v => v);
      // Treat the field as "unset" if it's empty OR matches a previous suggestion.
      if (!currentVal || otherSuggestions.includes(currentVal)) {
        this.form.ansible_user = suggestion;
      }
    },

    get selectedAsset() {
      if (!this.form.asset_key) return null;
      const [backend, ...rest] = this.form.asset_key.split('|');
      const name = rest.join('|');  // filenames can contain '|' in theory
      return this.assets.find(a => a.backend === backend && a.name === name) || null;
    },

    assetTypeLabel(type) {
      return { playbook: 'Playbook', script: 'Script (.sh)', rpm: 'Package (.rpm)', deb: 'Package (.deb)' }[type] || type;
    },

    backendLabel(id) {
      return ({
        s3:         'AWS S3',
        azure_blob: 'Azure Blob',
        gcs:        'GCS',
        local:      'Local',
      })[id] || id;
    },

    async init() {
      requireAuth();
      await Promise.all([
        this.loadInventory(),
        this.loadAssets(),
        this.loadCloudTargets(),
        this.loadJobs(),
      ]);
      this.loading = false;
    },

    async loadInventory() {
      try {
        const data = await API.get('/api/config-mgmt/inventory');
        this.targets = data.targets || [];
      } catch (e) {
        this.targets = [];
      }
    },

    async loadAssets() {
      this.assetsLoading = true;
      try {
        this.assets = await API.get('/api/config-mgmt/assets') || [];
      } catch (e) {
        this.assets = [];
      } finally {
        this.assetsLoading = false;
      }
    },

    async loadCloudTargets() {
      try {
        const data = await API.get('/api/config-mgmt/cloud-targets') || {};
        this.cloudTargets = {
          aws:   data.aws   || [],
          azure: data.azure || [],
          gcp:   data.gcp   || [],
        };
        this.sshUserSuggestions = data.default_users || {};
      } catch (e) {
        this.cloudTargets = { aws: [], azure: [], gcp: [] };
        this.sshUserSuggestions = {};
      }
    },

    async loadJobs() {
      this.jobsLoading = true;
      try {
        const all = await API.get('/api/jobs?limit=20');
        this.recentJobs = (all.jobs || []).filter(j => j.job_type === 'ansible_local');
      } catch (e) {
        this.recentJobs = [];
      } finally {
        this.jobsLoading = false;
      }
    },

    async runAsset() {
      this.runError = '';
      this.extraVarsError = '';

      let extra_vars = {};
      if (this.form.extra_vars_raw.trim()) {
        try {
          extra_vars = JSON.parse(this.form.extra_vars_raw);
        } catch (e) {
          this.extraVarsError = 'Invalid JSON: ' + e.message;
          return;
        }
      }

      // Decode cloud prefix from target value
      let target = this.form.target;
      let cloud = '';
      if (target.startsWith('aws:'))   { cloud = 'aws';   target = target.slice(4); }
      else if (target.startsWith('azure:')) { cloud = 'azure'; target = target.slice(6); }
      else if (target.startsWith('gcp:'))   { cloud = 'gcp';   target = target.slice(4); }

      // Split the composite asset_key (e.g. "s3|deploy.yml") into name +
      // backend so the API can fetch from the exact backend the user picked.
      if (!this.form.asset_key) {
        this.runError = 'Pick an asset first.';
        this.running = false;
        return;
      }
      const [assetBackend, ...rest] = this.form.asset_key.split('|');
      const assetName = rest.join('|');

      this.running = true;
      try {
        const result = await API.post('/api/config-mgmt/run', {
          asset: assetName,
          asset_backend: assetBackend,
          target,
          cloud,
          ansible_user: (this.form.ansible_user || '').trim(),
          extra_vars,
        });
        toast(`Queued — job ${result.job_id.slice(0, 8)}…`, 'success');
        window.location.href = '/jobs/' + result.job_id;
      } catch (e) {
        this.runError = e.message || 'Failed to queue run.';
      } finally {
        this.running = false;
      }
    },

    formatAge(ts) {
      if (!ts) return '';
      const d = new Date(ts + (ts.endsWith('Z') ? '' : 'Z'));
      const secs = Math.floor((Date.now() - d.getTime()) / 1000);
      if (secs < 60) return `${secs}s ago`;
      if (secs < 3600) return `${Math.floor(secs / 60)}m ago`;
      return `${Math.floor(secs / 3600)}h ago`;
    },
  };
}
</script>
{% endblock %}
